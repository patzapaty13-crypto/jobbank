<!DOCTYPE html>
<html lang="en">

<head>
  <title>Student Job Bank System</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="validate.js"></script>
  <script src="payRateCal.js"></script>
</head>

<body>

  <div class="container mt-3">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Student Job Bank System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDarkDropdown"
          aria-controls="navbarNavDarkDropdown" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDarkDropdown">
          <ul class="navbar-nav">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" id="navbarDarkDropdownMenuLink" role="button"
                data-bs-toggle="dropdown" aria-expanded="false">
                Job Opportunities
              </a>
              <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="navbarDarkDropdownMenuLink">
                <li><a class="dropdown-item" href="job1.html">นักศึกษาช่วยสอน (Student demonstrator)</a></li>
                <li><a class="dropdown-item" href="#">Job#2</a></li>
                <li><a class="dropdown-item" href="#">Job#3</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <form action="#" method="post" onsubmit="return validateForm()">
      <div class="mb-3 mt-3">
        <label for="nid" class="form-label">National ID<span style="color:red">*</span></label>
        <input type="text" class="form-control" id="nid" name="nid" />
      </div>
      <div class="mb-3 mt-3">
        <label for="fname" class="form-label">First Name<span style="color:red">*</span></label>
        <input type="text" class="form-control" id="fname" name="fname" />
      </div>
      <div class="mb-3 mt-3">
        <label for="lname" class="form-label">Last Name<span style="color:red">*</span></label>
        <input type="text" class="form-control" id="lname" name="lname" />
      </div>
      <div class="mb-3 mt-3">
        <label class="form-label">Gender<span style="color:red">*</span></label>&nbsp;&nbsp;
        <input type="radio" class="form-check-input" id="gender1" name="genderRad" value="1">&nbsp; Male &nbsp;&nbsp;
        <input type="radio" class="form-check-input" id="gender2" name="genderRad" value="2">&nbsp; Female &nbsp;&nbsp;
        <input type="radio" class="form-check-input" id="gender3" name="genderRad" value="3">&nbsp; Other
      </div>
      <div class="mb-3 mt-3">
        <label for="school" class="form-label">School<span style="color:red">*</span></label>
        <select class="form-select" id="school" name="shool">
          <option value="1">School of Science and Technology</option>
          <option value="2">School of Business Administration</option>
          <option value="3">School of Law</option>
          <option value="4">School of Art and Design</option>
        </select>
      </div>
      <div class="mb-3 mt-3">
        <label for="year" class="form-label">Year of Study<span style="color:red">*</span></label>
        <select class="form-select" id="year" name="year">
          <option value="1">1st Year (55 THB/hour)</option>
          <option value="2">2nd Year (65 THB/hour)</option>
          <option value="3">3rd Year (75 THB/hour)</option>
          <option value="4">4th Year or Greater (85 THB/hour)</option>
        </select>
      </div>
      <div class="mb-3 mt-3">
        <label for="workDays" class="form-label">How many days a week can you work? (Max 6 days/week)
          <span style="color:red">*</span></label>
        <input type="text" class="form-control" id="workDays" name="workDays" />
      </div>

      <button type="submit" class="btn btn-primary">Register</button>
      <button type="reset" class="btn btn-primary">Reset</button>
    </form><br><br>
  </div>
  <!-- PR Modal -->
  <style>
    /* Premium Modal Styling */
    .custom-pr-modal .modal-content {
      background: transparent;
      border: none;
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 20px rgba(195, 55, 100, 0.3);
      border-radius: 20px;
      overflow: hidden;
      transform: scale(0.9);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal.show .custom-pr-modal .modal-content {
      transform: scale(1);
      opacity: 1;
    }
    .custom-pr-modal .modal-header {
      background: linear-gradient(135deg, #1d2671 0%, #c33764 100%);
      color: #fff;
      border-bottom: none;
      padding: 1.25rem 1.5rem;
    }
    .custom-pr-modal .modal-title {
      font-weight: 700;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    .custom-pr-modal .btn-close {
      filter: invert(1) brightness(200%);
      opacity: 0.8;
      transition: transform 0.3s ease;
    }
    .custom-pr-modal .btn-close:hover {
      opacity: 1;
      transform: rotate(90deg);
    }
    .custom-pr-modal .modal-body {
      padding: 0;
      background: #0f0c29;
    }
    .custom-pr-modal img {
      width: 100%;
      display: block;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }
  </style>

  <div class="modal fade" id="prModal" tabindex="-1" aria-labelledby="prModalLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg custom-pr-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="prModalLabel">✨ งานสัมมนาน่าสนใจ ลงทะเบียนด่วน!!! ✨</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <img src="poster.png" alt="Data Analytics for MarTech">
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var prModal = new bootstrap.Modal(document.getElementById('prModal'));
      prModal.show();
    });
  </script>

</body>

</html>
